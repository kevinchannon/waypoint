name: Validate pipx Installation

on:
  workflow_run:
    workflows: ["Release to PyPI"]
    types:
      - completed
  workflow_dispatch:  # Allow manual triggering

jobs:
  validate-installation:
    # Only run if the release workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Ubuntu
          - os: macos-latest
            platform: macOS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for PyPI propagation
        if: github.event_name == 'workflow_run'
        run: |
          echo "Waiting 90 seconds for PyPI to propagate the new package..."
          sleep 90
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pipx
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath
        shell: bash

      - name: Install Waypoint via pipx
        run: python -m pipx install waypoint

      - name: Get installed version
        working-directory: example
        run: waypoint --version

      - name: Verify installation
        run: echo "✓ Waypoint successfully installed via pipx on ${{ matrix.platform }}"
